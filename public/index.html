<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Калькулятор цепочек обновлений 1С</title>
<style>
  :root {
    --bg:#0b0f14; --panel:#11171f; --panel-2:#0e131a; --line:#1f2935;
    --ink:#d7e0ea; --ink-dim:#7d8da0; --accent:#3fd07f; --accent-dim:#1c6b42;
    --warn:#e0a23f; --err:#e0533f; --mono:'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace;
    --sans:'Inter Tight',-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:
      radial-gradient(900px 500px at 85% -10%,rgba(63,208,127,.06),transparent 60%),
      var(--bg);
    color:var(--ink);font-family:var(--sans);
    min-height:100vh;padding:32px 20px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:24px}
  header h1{font-size:18px;font-weight:650;letter-spacing:-.02em}
  header .tag{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--accent-dim);padding:2px 7px;border-radius:4px}
  header .stat{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-dim)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px}
  .card.full{grid-column:1/-1}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-dim);margin-bottom:7px}
  input,select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:13px;padding:9px 11px;border-radius:6px;outline:none;
  }
  input:focus,select:focus{border-color:var(--accent-dim)}
  select{cursor:pointer}
  optgroup{color:var(--ink-dim);font-style:normal}
  option{color:var(--ink);background:var(--panel-2)}
  .row{display:flex;gap:10px;margin-top:12px}
  button{
    background:var(--accent);color:#03130a;border:0;font-family:var(--sans);font-weight:650;
    font-size:13px;padding:10px 20px;border-radius:6px;cursor:pointer;transition:filter .15s;
  }
  button:hover{filter:brightness(1.08)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .hint{font-size:12px;color:var(--ink-dim);margin-top:8px;line-height:1.5}
  #result{margin-top:18px}
  .chain{border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .chain-head{display:flex;justify-content:space-between;align-items:center;background:var(--panel-2);padding:11px 16px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px}
  .badge{font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid}
  .badge.ok{color:var(--accent);border-color:var(--accent-dim)}
  .badge.no{color:var(--warn);border-color:#5a4420}
  .step{display:grid;grid-template-columns:34px 1fr;gap:14px;padding:13px 16px;border-bottom:1px solid var(--line);align-items:start}
  .step:last-child{border-bottom:0}
  .step .n{font-family:var(--mono);font-size:12px;color:var(--ink-dim);text-align:right;padding-top:2px}
  .vmove{font-family:var(--mono);font-size:14px;letter-spacing:-.01em}
  .vmove .v0{color:var(--ink-dim)}
  .vmove .arr{color:var(--accent);margin:0 9px}
  .vmove .v1{color:var(--ink);font-weight:600}
  .cfu{font-family:var(--mono);font-size:11px;color:var(--ink-dim);margin-top:5px;word-break:break-all}
  .msg{padding:16px;font-size:13px;line-height:1.6;color:var(--ink-dim);border:1px solid var(--line);border-radius:8px;background:var(--panel)}
  .msg.warn{color:var(--warn);border-color:#5a4420}
  footer{margin-top:30px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Калькулятор цепочек обновлений</h1>
    <span class="tag">1С · v8cscdsc.lst</span>
    <span class="stat" id="stat">…</span>
  </header>

  <div class="grid">
    <div class="card full">
      <label for="cfg">Конфигурация</label>
      <input id="cfg" list="cfglist" placeholder="начните вводить: Бухгалтерия, ЗУП, Розница…" autocomplete="off" />
      <datalist id="cfglist"></datalist>
      <div class="hint" id="cfghint">Выберите конфигурацию, чтобы загрузить список версий.</div>
    </div>

    <div class="card">
      <label for="from">Версия «откуда»</label>
      <select id="from" disabled><option>—</option></select>
    </div>
    <div class="card">
      <label for="to">Версия «куда»</label>
      <select id="to" disabled><option>—</option></select>
    </div>

    <div class="card full">
      <div class="row">
        <button id="calc" disabled>Построить цепочку</button>
      </div>
      <div id="result"></div>
    </div>
  </div>

  <footer>переходы между редакциями не входят в цепочку — это отдельная процедура</footer>
</div>

<script>
const $ = s => document.querySelector(s);
const api = (p, q) => fetch(p + (q ? "?" + new URLSearchParams(q) : "")).then(r => r.json());

async function loadStats(){
  try{
    const s = await api("/api/stats");
    $("#stat").textContent = `${s.configurations} конфигураций · ${s.edges} рёбер`;
  }catch{ $("#stat").textContent = "БД недоступна"; }
}

let cfgTimer;
$("#cfg").addEventListener("input", e => {
  clearTimeout(cfgTimer);
  const v = e.target.value.trim();
  cfgTimer = setTimeout(async () => {
    if (v.length < 2) return;
    const rows = await api("/api/configs", { q: v });
    const dl = $("#cfglist"); dl.innerHTML = "";
    rows.forEach(r => { const o = document.createElement("option"); o.value = r.name; dl.appendChild(o); });
    if (rows.some(r => r.name === v)) loadVersions(v);
  }, 200);
});
$("#cfg").addEventListener("change", e => loadVersions(e.target.value.trim()));

async function loadVersions(name){
  const data = await api("/api/versions", { config: name });
  const fromSel = $("#from"), toSel = $("#to");
  if (!data.versions || !data.versions.length){
    $("#cfghint").textContent = "Для этой конфигурации в базе нет версий.";
    fromSel.disabled = toSel.disabled = $("#calc").disabled = true;
    return;
  }
  const opts = (data.editions || [{edition:0,versions:data.versions}])
    .map(g => `<optgroup label="Редакция ${g.edition}.x">` +
      g.versions.map(v => `<option>${v}</option>`).join("") + `</optgroup>`).join("");
  fromSel.innerHTML = opts; toSel.innerHTML = opts;
  toSel.selectedIndex = toSel.options.length - 1;
  fromSel.disabled = toSel.disabled = $("#calc").disabled = false;
  $("#cfghint").textContent = `${data.versions.length} версий в базе. Цепочка строится в пределах одной редакции.`;
}

$("#calc").addEventListener("click", async () => {
  const config = $("#cfg").value.trim();
  const from = $("#from").value, to = $("#to").value;
  $("#result").innerHTML = `<div class="msg">Вычисляю…</div>`;
  const r = await api("/api/chain", { config, from, to });

  if (r.error){ $("#result").innerHTML = `<div class="msg warn">${r.error}</div>`; return; }
  if (r.note && !r.found){ $("#result").innerHTML = `<div class="msg warn">${r.note}</div>`; return; }
  if (!r.found){
    $("#result").innerHTML = `<div class="msg warn">Непрерывная цепочка <b>${from} → ${to}</b> не найдена. Возможно, отсутствуют промежуточные обновления или версии на разных ветках.</div>`;
    return;
  }
  if (r.length === 0){ $("#result").innerHTML = `<div class="msg">Версии совпадают — обновление не требуется.</div>`; return; }

  const steps = r.steps.map((s,i) => `
    <div class="step">
      <div class="n">${String(i+1).padStart(2,"0")}</div>
      <div>
        <div class="vmove"><span class="v0">${s.fromVersion}</span><span class="arr">→</span><span class="v1">${s.toVersion}</span></div>
        ${s.cfuPath ? `<div class="cfu">${s.cfuPath}</div>` : ""}
      </div>
    </div>`).join("");
  $("#result").innerHTML = `
    <div class="chain">
      <div class="chain-head">
        <span>${config}</span>
        <span class="badge ok">${r.length} шаг(ов) · ${from} → ${to}</span>
      </div>${steps}
    </div>`;
});

loadStats();
</script>
</body>
</html>
