name: Build & Push Docker image

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'   # каждую ночь в 2:00 UTC
  workflow_dispatch:       # ручной запуск из интерфейса GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # нужно для push в ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write build info into public/version.json
        run: |
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "{\"date\":\"$DATE\",\"commit\":\"$SHORT_SHA\"}" > public/version.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
